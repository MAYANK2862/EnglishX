upstream ms1 {
    server ms1-core-api:3001;
}

upstream ms2 {
    server ms2-speech-agent:8000;
}

server {
    listen 80;
    server_name localhost;

    # Increase body size for audio uploads
    client_max_body_size 25M;

    # Increase timeouts for speech processing
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # Gzip for JSON responses
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 256;

    # API routes → ms1
    location /api/ {
        proxy_pass http://ms1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Speech routes → ms2
    location /speech/ {
        proxy_pass http://ms2;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Larger body for audio
        client_max_body_size 50M;
        proxy_read_timeout 180s;
    }

    # Health checks
    location /health {
        proxy_pass http://ms1/api/health;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
