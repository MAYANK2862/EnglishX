name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ms1-lint-test:
    name: ms1 — Lint & Test
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && 
       contains(join(github.event.pull_request.changed_files.*.filename, ','), 'ms1-core-api/'))
    defaults:
      run:
        working-directory: ms1-core-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ms1-core-api/package-lock.json
      - run: npm ci
      - run: npm test

  ms2-lint-test:
    name: ms2 — Lint & Test
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       contains(join(github.event.pull_request.changed_files.*.filename, ','), 'ms2-speech-agent/'))
    defaults:
      run:
        working-directory: ms2-speech-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m pytest --tb=short || echo "No tests yet"

  frontend-lint-test:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       contains(join(github.event.pull_request.changed_files.*.filename, ','), 'frontend/'))
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint || echo "Lint not configured yet"
      - run: npm test || echo "No tests yet"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ms1-lint-test, ms2-lint-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build ms1 image
        run: docker build -t englishx-ms1:latest ./ms1-core-api

      - name: Build ms2 image
        run: docker build -t englishx-ms2:latest ./ms2-speech-agent
